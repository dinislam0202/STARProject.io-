<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сообщения — STARProject</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { oilBlue: '#002147', energyOrange: '#FF8C00', deepDark: '#001529' } } }
        }
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #FF8C00; border-radius: 10px; }
    </style>
</head>
<body class="bg-deepDark min-h-screen flex text-white overflow-hidden">
    
    <!-- Side Nav (Minified) -->
    <aside class="w-20 border-r border-white/5 flex flex-col items-center py-8 gap-10 bg-oilBlue/50">
        <a href="index.html" class="text-2xl font-900 text-energyOrange italic">S.</a>
        <div class="flex flex-col gap-6">
            <a href="index.html" class="w-12 h-12 flex items-center justify-center rounded-2xl text-gray-500 hover:text-white transition"><i class="fa-solid fa-house"></i></a>
            <a href="#" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-energyOrange text-white shadow-lg shadow-energyOrange/20"><i class="fa-solid fa-message"></i></a>
            <a href="profile.html" class="w-12 h-12 flex items-center justify-center rounded-2xl text-gray-500 hover:text-white transition"><i class="fa-solid fa-user"></i></a>
        </div>
        <div class="mt-auto">
            <a href="index.html" class="w-12 h-12 flex items-center justify-center rounded-2xl text-gray-500 hover:text-white transition"><i class="fa-solid fa-right-from-bracket"></i></a>
        </div>
    </aside>

    <!-- Chat List -->
    <div class="w-80 border-r border-white/5 hidden md:flex flex-col">
        <div class="p-6 border-b border-white/5">
            <h2 class="text-xl font-800 uppercase tracking-tighter">Диалоги</h2>
        </div>
        <div class="flex-1 overflow-y-auto flex flex-col items-center justify-center p-8 opacity-20 text-center">
            <i class="fa-solid fa-users-slash text-4xl mb-4"></i>
            <p class="text-[10px] uppercase font-bold">Список пуст</p>
        </div>
    </div>

    <!-- Active Chat -->
    <div class="flex-1 flex flex-col items-center justify-center text-center p-12 opacity-50">
        <div class="w-20 h-20 glass rounded-2xl flex items-center justify-center text-4xl mb-6">
            <i class="fa-solid fa-comments"></i>
        </div>
        <h2 class="text-2xl font-bold mb-2 uppercase tracking-widest">Чат будет доступен после мэтча</h2>
        <p class="text-gray-400 max-w-sm">
            Когда система подберет тебе идеального соседа, здесь появится возможность начать общение.
        </p>
    </div>

</body>
</html>
